name: 🏆 إنشاء إصدار APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'رقم الإصدار (مثل: 1.0.0)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'ملاحظات الإصدار'
        required: false
        default: 'إصدار جديد من تطبيق إدارة كروت الشبكة'

jobs:
  create-release:
    name: 🎯 إنشاء إصدار APK
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 تحميل الكود
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ☕ إعداد Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🛠️ إعداد Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 9477386
        packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

    - name: 🔧 إعداد Gradle
      run: |
        cd android-app
        chmod +x gradlew

    - name: 📝 تحديث رقم الإصدار
      run: |
        cd android-app
        VERSION="${{ github.event.inputs.version || '1.0.0' }}"
        
        # تحديث build.gradle
        sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" app/build.gradle
        sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
        
        echo "✅ تم تحديث الإصدار إلى: $VERSION"

    - name: 🏗️ بناء APK Release
      run: |
        cd android-app
        ./gradlew clean assembleRelease --stacktrace
        
        echo "🔍 البحث عن ملفات APK..."
        find . -name "*.apk" -type f -exec ls -lah {} \;

    - name: ✍️ توقيع APK
      run: |
        cd android-app
        
        # إنشاء keystore مؤقت للتوقيع
        keytool -genkey -v -keystore release-key.keystore -keyalg RSA -keysize 2048 -validity 10000 -alias release-key -dname "CN=Network Cards, OU=Development, O=Network Cards, L=Riyadh, ST=Riyadh, C=SA" -storepass android -keypass android
        
        # توقيع APK
        APK_PATH=$(find . -name "app-release-unsigned.apk" -o -name "*-release-unsigned.apk" | head -1)
        if [ -n "$APK_PATH" ]; then
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release-key.keystore -storepass android -keypass android "$APK_PATH" release-key
          
          # محاذاة APK
          zipalign -v 4 "$APK_PATH" "NetworkCardsManager-v${{ github.event.inputs.version || '1.0.0' }}-release.apk"
          
          echo "✅ تم توقيع APK بنجاح!"
        else
          echo "❌ لم يتم العثور على APK للتوقيع"
          find . -name "*.apk" -type f
        fi

    - name: 📊 معلومات APK النهائي
      run: |
        cd android-app
        
        echo "🎯 ملفات APK المُنشأة:"
        find . -name "NetworkCardsManager-*.apk" -type f -exec ls -lah {} \;
        
        APK_FILE=$(find . -name "NetworkCardsManager-v*.apk" | head -1)
        if [ -n "$APK_FILE" ]; then
          echo "📱 APK النهائي: $APK_FILE"
          echo "📏 الحجم: $(du -h "$APK_FILE" | cut -f1)"
          echo "🔐 موقع: نعم"
          echo "✅ جاهز للنشر!"
        fi

    - name: 🎊 إنشاء GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version || '1.0.0' }}
        name: 📱 إدارة كروت الشبكة v${{ github.event.inputs.version || '1.0.0' }}
        body: |
          # 🚀 إصدار جديد من تطبيق إدارة كروت الشبكة اللاسلكية
          
          ## 📱 معلومات الإصدار:
          - **الإصدار:** v${{ github.event.inputs.version || '1.0.0' }}
          - **تاريخ البناء:** ${{ github.run_number }}
          - **تاريخ الإصدار:** $(date)
          
          ## ✨ الميزات:
          - إدارة شاملة للمحلات والعملاء
          - إدارة الباقات والمخزون مع مسح الباركود
          - تقارير ورسوم بيانية تفاعلية
          - إشعارات ذكية ومزامنة مع التطبيق الويب
          - تصميم Material Design 3 مع دعم كامل للعربية
          
          ## 📥 كيفية التثبيت:
          1. حمّل ملف APK من الأسفل
          2. فعّل "مصادر غير معروفة" في إعدادات أندرويد
          3. اضغط على APK للتثبيت
          4. اتبع التعليمات
          
          ## 🔧 المتطلبات:
          - Android 7.0+ (API 24)
          - 50 MB مساحة تخزين
          - اتصال إنترنت للمزامنة
          
          ${{ github.event.inputs.release_notes || 'إصدار محسن مع إصلاحات وميزات جديدة' }}
          
          ---
          💚 **شكراً لاستخدام تطبيق إدارة كروت الشبكة!**
        files: |
          android-app/NetworkCardsManager-v${{ github.event.inputs.version || '1.0.0' }}-release.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 🎉 إشعار النجاح
      run: |
        echo "🎊 تم إنشاء الإصدار بنجاح!"
        echo "📱 الإصدار: v${{ github.event.inputs.version || '1.0.0' }}"
        echo "🔗 الرابط: https://github.com/${{ github.repository }}/releases"
        echo "📥 يمكن تحميل APK من صفحة Releases"