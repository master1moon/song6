name: 🎯 بناء APK فائق البساطة

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release

jobs:
  build-ultra-simple:
    name: 🔥 بناء سريع ومضمون
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 تحميل الكود
      uses: actions/checkout@v4

    - name: ☕ إعداد Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🔧 استخدام Android SDK الموجود
      run: |
        echo "🔍 فحص Android SDK الموجود..."
        ls -la /usr/local/lib/android/sdk/ || true
        
        echo "🔧 إعداد متغيرات البيئة..."
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        export PATH=$PATH:$ANDROID_HOME/platform-tools
        export PATH=$PATH:$ANDROID_HOME/build-tools/34.0.0
        
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
        echo "/usr/local/lib/android/sdk/build-tools/34.0.0" >> $GITHUB_PATH
        
        echo "📋 فحص الأدوات المتاحة..."
        which sdkmanager || echo "sdkmanager غير متاح"
        which aapt || echo "aapt غير متاح"
        
        echo "✅ تم إعداد Android SDK!"

    - name: 🔧 إعداد Gradle
      run: |
        cd android-app
        
        echo "🔍 فحص مشروع Android..."
        ls -la
        
        echo "🔧 تحديث صلاحيات gradlew..."
        chmod +x gradlew
        
        echo "📋 فحص إصدار Gradle..."
        ./gradlew --version
        
        echo "✅ Gradle جاهز!"

    - name: 🏗️ بناء APK
      run: |
        cd android-app
        
        BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
        echo "🏗️ بناء APK نوع: $BUILD_TYPE"
        
        # تنظيف المشروع أولاً
        echo "🧹 تنظيف المشروع..."
        ./gradlew clean --no-daemon --stacktrace
        
        # بناء APK
        if [ "$BUILD_TYPE" = "release" ]; then
          echo "🏗️ بناء Release APK..."
          ./gradlew assembleRelease --no-daemon --stacktrace --info
        else
          echo "🏗️ بناء Debug APK..."
          ./gradlew assembleDebug --no-daemon --stacktrace --info
        fi
        
        echo "✅ تم بناء APK بنجاح!"

    - name: 📋 عرض النتائج
      run: |
        cd android-app
        
        echo "🔍 البحث عن ملفات APK..."
        find . -name "*.apk" -type f -exec ls -lah {} \; || echo "لم يتم العثور على APK"
        
        echo ""
        echo "📊 تفاصيل APK المُنشأة:"
        for apk in $(find . -name "*.apk" -type f 2>/dev/null); do
          if [ -f "$apk" ]; then
            echo "📱 الملف: $apk"
            echo "📏 الحجم: $(du -h "$apk" | cut -f1)"
            echo "🕒 التاريخ: $(stat -c %y "$apk" 2>/dev/null || stat -f %Sm "$apk")"
            echo "---"
          fi
        done
        
        # البحث في جميع المجلدات المحتملة
        echo ""
        echo "🔍 البحث الشامل عن APK..."
        find . -name "*.apk" -type f 2>/dev/null | head -10

    - name: 📤 رفع جميع ملفات APK
      uses: actions/upload-artifact@v4
      with:
        name: NetworkCards-${{ github.event.inputs.build_type || 'debug' }}-$(date +%Y%m%d-%H%M)
        path: |
          android-app/**/*.apk
          android-app/app/build/outputs/apk/**/*.apk
        retention-days: 30
        if-no-files-found: warn

    - name: 🎊 تقرير النجاح
      run: |
        echo "🎉 مبروك! تم بناء APK بنجاح!"
        echo ""
        echo "📱 معلومات البناء:"
        echo "   النوع: ${{ github.event.inputs.build_type || 'debug' }}"
        echo "   التاريخ: $(date)"
        echo "   الوقت المستغرق: منذ بداية الـ workflow"
        echo ""
        echo "📥 كيفية التحميل:"
        echo "1. انزل لأسفل هذه الصفحة"
        echo "2. ابحث عن قسم 'Artifacts'"
        echo "3. اضغط على اسم الـ Artifact للتحميل"
        echo "4. فك الضغط واحصل على APK"
        echo ""
        echo "📱 كيفية التثبيت:"
        echo "1. انقل APK لجهاز أندرويد"
        echo "2. فعّل 'مصادر غير معروفة' في الإعدادات"
        echo "3. اضغط على APK للتثبيت"
        echo ""
        echo "🚀 APK جاهز للاستخدام!"
        
        # فحص نهائي للتأكد
        APK_COUNT=$(find android-app -name "*.apk" -type f 2>/dev/null | wc -l)
        if [ "$APK_COUNT" -gt 0 ]; then
          echo "✅ تأكيد: تم العثور على $APK_COUNT ملف APK"
        else
          echo "⚠️ تحذير: لم يتم العثور على ملفات APK"
        fi