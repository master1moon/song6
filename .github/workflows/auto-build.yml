name: 🔄 البناء التلقائي للـ APK

on:
  push:
    branches: [ main, cursor/* ]
    paths:
      - 'android-app/**'
      - '.github/workflows/**'

jobs:
  auto-build:
    name: 🤖 بناء تلقائي
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
    - name: 📥 تحميل الكود
      uses: actions/checkout@v4

    - name: ☕ إعداد Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🛠️ إعداد Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 9477386
        packages: |
          platforms;android-34
          build-tools;34.0.0
          platform-tools

    - name: 🔧 إعداد Gradle
      run: |
        cd android-app
        chmod +x gradlew

    - name: 🏗️ بناء APK سريع
      run: |
        cd android-app
        ./gradlew assembleDebug --parallel --daemon
        
    - name: 📱 رفع APK
      uses: actions/upload-artifact@v4
      with:
        name: Auto-Built-APK-${{ github.run_number }}
        path: android-app/app/build/outputs/apk/debug/*.apk
        retention-days: 7

    - name: 💬 تعليق على Commit
      uses: actions/github-script@v7
      if: github.event_name == 'push'
      with:
        script: |
          const { owner, repo } = context.repo;
          const sha = context.sha;
          
          await github.rest.repos.createCommitComment({
            owner,
            repo,
            commit_sha: sha,
            body: `🎉 **تم بناء APK تلقائياً!**
            
            📱 **APK جاهز للتحميل:**
            - اذهب إلى [Actions](https://github.com/${owner}/${repo}/actions)
            - ابحث عن run رقم #${{ github.run_number }}
            - حمّل الـ Artifact: \`Auto-Built-APK-${{ github.run_number }}\`
            
            ✅ **معلومات البناء:**
            - الوقت: $(date)
            - الفرع: ${{ github.ref_name }}
            - Commit: ${sha.substring(0, 7)}
            
            🚀 **APK جاهز للتثبيت على أندرويد!**`
          });