name: 🔥 بناء APK مبسط جداً

on:
  workflow_dispatch:

jobs:
  build-minimal:
    name: 📱 بناء مبسط
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 تحميل الكود
      uses: actions/checkout@v4

    - name: ☕ إعداد Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 🔧 إعداد Android SDK يدوياً
      run: |
        echo "📦 تحميل Android SDK..."
        cd $HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        echo "📁 إعداد مجلدات..."
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        
        echo "🔧 إعداد متغيرات البيئة..."
        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
        
        echo "📋 قبول التراخيص..."
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        
        echo "📦 تثبيت المكونات..."
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools"
        
        echo "✅ تم إعداد Android SDK!"

    - name: 🏗️ بناء APK
      run: |
        cd android-app
        
        echo "🔧 إعداد gradlew..."
        chmod +x gradlew
        
        echo "🏗️ بناء APK..."
        ./gradlew assembleDebug --no-daemon
        
        echo "✅ تم البناء!"

    - name: 📋 عرض النتائج
      run: |
        echo "🔍 البحث عن APK..."
        find android-app -name "*.apk" -type f -exec ls -lah {} \;

    - name: 📤 رفع APK
      uses: actions/upload-artifact@v4
      with:
        name: NetworkCards-APK
        path: android-app/**/*.apk
        if-no-files-found: warn

    - name: 🎉 النجاح
      run: |
        echo "🎊 تم بناء APK بنجاح!"
        echo "📥 حمّله من Artifacts أسفل الصفحة"