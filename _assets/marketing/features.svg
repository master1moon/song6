<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#0b1220"/><g fill="#fff" font-family="Arial" ><text x="800" y="120" font-size="52" font-weight="700" text-anchor="middle">ميزات رئيسية</text><g font-size="26" opacity=".95"><text x="160" y="220">• إدارة الباقات والأسعار</text><text x="160" y="270">• إدارة الكميات والمخزون</text><text x="160" y="320">• إدارة المحلات والأرصدة والديون</text><text x="160" y="370">• إدارة المصروفات مع تصنيفات</text><text x="160" y="420">• تقارير أرباح وديون وملخصات</text><text x="160" y="470">• تصدير Excel/TXT وطباعة</text><text x="160" y="520">• نسخ احتياطي محلي وسحابي</text><text x="160" y="570">• وضع عدم الاتصال (PWA)</text><text x="160" y="620">• واجهة عربية محسّنة للجوال</text></g></g></svg>
